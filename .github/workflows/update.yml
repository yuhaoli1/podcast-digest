name: Update podcast digest

on:
  schedule:
    - cron: "0 14 * * *" # 14:00 UTC daily
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: digest-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180 # audio transcription of a full episode can take a while
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Cache the faster-whisper model so it isn't re-downloaded every run.
      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-${{ env.WHISPER_MODEL || 'base.en' }}

      - name: Fetch and summarize new episodes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: set these repo secrets to make All-In (YouTube captions)
          # work from GitHub's datacenter IPs. See README.
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
        run: python scripts/main.py

      - name: Commit updated digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/episodes.json docs/state.json
          if git diff --staged --quiet; then
            echo "No new episodes."
          else
            git commit -m "Update digest ($(date -u +%Y-%m-%d))"
            git push
          fi
